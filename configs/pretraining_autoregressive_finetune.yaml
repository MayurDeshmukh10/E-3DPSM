seed_everything: 42

model:
  class_path: EventEgoPoseEstimation.modules.EventEgoPoseEstimation
  init_args:
    model_cfg:
      num_joints: 16
      eros: True
      input_channel: 20 #36 (works well in vis) #18 #12 #18
      posenet_input_channel: 2
      image_size: [256, 192]
      batch_size: 6 #16 # 9 # individual batch size
      #heatmap_size: [config.MODEL.IMAGE_SIZE[0] // config.MODEL.HEAT_MAP_SCALE, config.MODEL.IMAGE_SIZE[1] // config.MODEL.HEAT_MAP_SCALE] TODO: fix this
    
    # dataset_cfg:
    #   dataset_type: synthetic # real, synthetic
    #   bg_aug: false
    #   real_root: /CT/datasets07/nobackup/EE3D-R/Real_Dataset
    #   syn_root: /CT/datasets07/nobackup/EE3D-S
    #   syn_test_root: /CT/datasets07/nobackup/EE3D-S-Test
    #   background_dataset_root: /CT/datasets07/nobackup/EE3D-R/Background_Dataset
    #   scale_factor: 0.2
    #   flip: true
    #   rot_factor: 3

    #   representaton: RawEvent
    #   event_batch_size: 4096
    lr: 0.001 # changed from 0.01 which was in pretraining_autoregressive.yaml
    lr_decay_epochs:
      - 26 #10
      - 27 #15
    dataset_type:  real #synthetic # real
    training_type: finetune #finetune #pretrain # finetune
    temporal_steps: 1
    batch_size: 24
    workers: 14


ckpt_path: /CT/EventEgo3Dv2/work/EventEgo3Dv2/results/delta_prediction_gpu20_autoregressive/version_1/checkpoints/epoch_epoch=04_step_step=130000.ckpt

trainer:
  accelerator: gpu
  max_epochs: 15
  check_val_every_n_epoch: 1
  devices: 4
  num_nodes: 2
  benchmark: false
  precision: 16-mixed
  strategy: ddp_find_unused_parameters_true
  fast_dev_run: false
  # limit_train_batches: 2
  # limit_val_batches: 2

  callbacks:
    - class_path: pytorch_lightning.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 50
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        every_n_epochs: 1
        save_top_k: -1
        filename: "{epoch}"
    - class_path: EventEgoPoseEstimation.modules.pose_estimation.EvaluateCallback
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        every_n_train_steps: 10000
        save_top_k: -1
        filename: "epoch_{epoch:02d}_step_{step}"
        # dirpath: "./results/"
        save_last: True

  logger:
  - class_path: pytorch_lightning.loggers.WandbLogger
    init_args:
      name: delta_prediction_gpu20_autoregressive_finetune  # Experiment name on wandb
      project: EventEgo3Dv2  # Replace with your project name on wandb
      save_dir: ./results/wandb_data/delta_prediction_gpu20_autoregressive_finetune  # Local directory to save wandb logs
      log_model: true  # Log the model checkpoints to wandb
      offline: false  # Set to true if you want to log offline and sync later
  - class_path: pytorch_lightning.loggers.TensorBoardLogger
    init_args:
      save_dir: ./results/
      name: delta_prediction_gpu20_autoregressive_finetune  # TensorBoard experiment name
